services:
  - type: web
    name: emergency-supply-chain-realtime
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: CORS_ORIGIN
        value: "*"
      - key: REDIS_URL
        sync: false
